# Deploy target: i2s-odin (Docker-only server, no git, no Python).
#
# This compose file references an image that is loaded from a tar file
# via `docker load -i evo-help.tar`. There is no `build:` step here —
# the server never builds images.
#
# First-time setup / every update, from the folder where this file lives:
#     docker load -i evo-help.tar
#     docker compose up -d --force-recreate
#
# Or, the one-click wrapper that does both:
#     update-server.bat

services:
  evo-help:
    image: evo-help:latest
    container_name: evo-help
    restart: unless-stopped
    ports:
      - "8765:8765"
