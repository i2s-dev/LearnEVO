# Deploy target: i2s111-CTDC4 (Windows server, Docker).
#
# Usage on the server:
#     cd C:\deploy\LearnEVO
#     docker compose up -d --build          # first run / after Dockerfile edits
#     git pull                              # for content updates (no rebuild)
#
# The ./learnevo-help volume is mounted read-only so the container can
# never mutate the checked-out working tree.

services:
  evo-help:
    build: .
    image: evo-help:local
    container_name: evo-help
    restart: unless-stopped
    ports:
      - "8765:8765"
    volumes:
      - ./learnevo-help:/app/learnevo-help:ro
    environment:
      HOST: 0.0.0.0
      PORT: "8765"
      NO_BROWSER: "1"
